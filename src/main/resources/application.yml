spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wallet_db?TimeZone=UTC
    username: wallet_user
    password: wallet_pass
    jackson:
      time-zone: UTC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect

  docker:
    compose:
      enabled: false
server:
  port: 8081

